version: '3.8'
services:
  roostoo-bot:
    build: .
    container_name: roostoo-bot
    environment:
      - ROOSTOO_API_KEY=${ROOSTOO_API_KEY}
      - ROOSTOO_SECRET=${ROOSTOO_SECRET}
      - PAIR=${PAIR:-BTC/USD}
      - SYMBOL=${SYMBOL:-BTCUSDT}
      - MIN_ORDER_USD=${MIN_ORDER_USD:-10}
      - RISK_PER_TRADE=${RISK_PER_TRADE:-0.02}
      - MAX_CYCLES=${MAX_CYCLES:-500}
      - INTERVAL_SECONDS=${INTERVAL_SECONDS:-10}
    volumes:
      - ./bot/logs:/app/bot/logs
    tty: true
